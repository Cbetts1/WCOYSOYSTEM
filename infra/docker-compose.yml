version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vaga-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vaga}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vagapassword}
      POSTGRES_DB: ${POSTGRES_DB:-vagadb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vaga}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: node:20-alpine
    container_name: vaga-migrate
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vaga}:${POSTGRES_PASSWORD:-vagapassword}@postgres:5432/${POSTGRES_DB:-vagadb}
    command: node infra/scripts/migrate.js
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  seed:
    image: node:20-alpine
    container_name: vaga-seed
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vaga}:${POSTGRES_PASSWORD:-vagapassword}@postgres:5432/${POSTGRES_DB:-vagadb}
    command: node infra/scripts/seed.js
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  backend-api:
    build:
      context: .
      dockerfile: apps/backend-api/Dockerfile
    container_name: vaga-backend-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vaga}:${POSTGRES_PASSWORD:-vagapassword}@postgres:5432/${POSTGRES_DB:-vagadb}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: 4000
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker-arrow:
    build:
      context: .
      dockerfile: apps/worker-arrow/Dockerfile
    container_name: vaga-worker-arrow
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vaga}:${POSTGRES_PASSWORD:-vagapassword}@postgres:5432/${POSTGRES_DB:-vagadb}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend-user:
    build:
      context: apps/frontend-user
      dockerfile: Dockerfile
    container_name: vaga-frontend-user
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "${FRONTEND_USER_PORT:-3000}:3000"
    depends_on:
      - backend-api
    restart: unless-stopped

  frontend-admin:
    build:
      context: apps/frontend-admin
      dockerfile: Dockerfile
    container_name: vaga-frontend-admin
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "${FRONTEND_ADMIN_PORT:-3001}:3001"
    depends_on:
      - backend-api
    restart: unless-stopped

volumes:
  postgres_data:
